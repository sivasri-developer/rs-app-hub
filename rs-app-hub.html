<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RS - Smart App Hub</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --pink: #ff4b6e;
      --pink-dark: #d93a59;
      --purple: #9b59b6;
      --bg: linear-gradient(135deg, #ffdde1 0%, #ee9ca7 50%, #c9d6ff 100%);
      --card-bg: rgba(255,255,255,0.95);
      --text: #2d2d2d;
      --muted: #666;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── NAVBAR ── */
    nav {
      width: 100%;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 14px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }

    .logo-container { display: flex; align-items: center; gap: 12px; }

    .logo-square {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #ff4b6e, #9b59b6, #f39c12);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(255,75,110,0.4);
      transition: transform 0.25s;
    }
    .logo-square:hover { transform: scale(1.08); }
    .logo-text { font-weight: 900; color: white; font-size: 18px; letter-spacing: 1px; }
    .logo-name { font-weight: 700; color: white; font-size: 15px; text-shadow: 0 1px 4px rgba(0,0,0,0.2); }

    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-links a {
      text-decoration: none; color: white; font-weight: 600; font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--pink); }

    #user-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 30px;
      padding: 6px 14px 6px 8px;
    }
    #user-badge .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #ff4b6e, #9b59b6);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: white;
    }
    #user-badge .uname { color: white; font-weight: 600; font-size: 13px; }
    #logout-btn {
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 6px 14px;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      transition: background 0.2s;
    }
    #logout-btn:hover { background: rgba(255,75,110,0.7); }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 56px 20px 24px;
    }
    .hero h1 {
      font-size: 48px; font-weight: 900; color: white;
      text-shadow: 0 2px 16px rgba(0,0,0,0.18);
      margin-bottom: 10px;
    }
    .hero p { font-size: 18px; color: rgba(255,255,255,0.85); }

    /* ── LOGIN PAGE ── */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 70px;
    }

    .login-box {
      background: white;
      width: 360px;
      max-width: 100%;
      padding: 40px 36px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 8px;
      color: var(--pink);
      font-size: 26px;
    }
    .login-box .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; position: relative; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #f0f0f0;
      background: #fafafa;
      border-radius: 10px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: var(--pink);
      background: white;
    }

    .show-pw-btn {
      position: absolute;
      right: 12px; top: 34px;
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      font-size: 12px; padding: 4px;
    }
    .show-pw-btn:hover { color: var(--pink); }

    #login-error {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
      display: none;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      border: none;
      background: linear-gradient(135deg, #ff4b6e, #9b59b6);
      color: white;
      font-size: 15px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    .hint {
      margin-top: 20px;
      padding: 12px;
      background: #fff3f5;
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .hint strong { color: var(--pink); }

    /* ── MAIN APP PAGE ── */
    #app-page { display: none; padding-bottom: 60px; }

    /* Search bar */
    .search-bar-wrapper {
      display: flex;
      justify-content: center;
      padding: 0 20px 30px;
    }
    .search-bar {
      position: relative;
      width: 100%;
      max-width: 460px;
    }
    .search-bar input {
      width: 100%;
      padding: 14px 20px 14px 46px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      background: rgba(255,255,255,0.92);
      outline: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      color: var(--text);
      transition: box-shadow 0.2s;
    }
    .search-bar input:focus { box-shadow: 0 4px 20px rgba(255,75,110,0.3); }
    .search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 17px;
    }

    /* Category filter */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 20px 32px;
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.3);
      color: white;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--pink);
      border-color: var(--pink);
    }

    /* Section headings */
    .section-title {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    /* APPS GRID */
    .apps-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 22px;
      padding: 10px 50px 40px;
    }

    .app-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px 18px 20px;
      text-align: center;
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ff4b6e, #9b59b6);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .app-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 16px 36px rgba(0,0,0,0.18);
    }
    .app-card:hover::before { opacity: 1; }

    .app-card .category-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .tag-shopping { background: #fff0f3; color: #ff4b6e; }
    .tag-food     { background: #fff5e6; color: #e67e22; }
    .tag-ott      { background: #f0eaff; color: #8e44ad; }

    .app-card img {
      width: 70px; height: 70px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .app-card h3 { margin-bottom: 6px; color: #333; font-size: 15px; }
    .app-card p  { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.4; }

    .open-btn {
      text-decoration: none;
      background: linear-gradient(135deg, #ff4b6e, #9b59b6);
      color: white;
      padding: 9px 20px;
      border-radius: 10px;
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.15s;
    }
    .open-btn:hover { opacity: 0.88; transform: scale(1.04); }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.8);
      font-size: 16px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      font-weight: 600;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2d2d2d;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media(max-width:768px){
      .hero h1 { font-size: 32px; }
      .apps-container { padding: 10px 16px 40px; }
      nav { padding: 12px 20px; }
      .logo-name { display: none; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo-container">
    <div class="logo-square"><span class="logo-text">RS</span></div>
    <span class="logo-name">App Hub</span>
  </div>
  <div class="nav-right">
    <div class="nav-links" id="nav-links-login">
      <a href="#login-page">Login</a>
    </div>
    <div id="user-badge">
      <div class="avatar" id="avatar-initials">U</div>
      <span class="uname" id="nav-username"></span>
    </div>
    <button id="logout-btn" onclick="logout()" style="display:none;">Logout</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Welcome to RS App Hub</h1>
  <p>All your favourite shopping, OTT &amp; food apps — one place</p>
</section>

<!-- ══════════════ LOGIN PAGE ══════════════ -->
<div id="login-page">
  <div class="login-box">
    <h2>Sign In</h2>
    <p class="subtitle">Enter your credentials to continue</p>
    <div id="login-error">⚠ Incorrect username or password.</div>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="e.g. roshini" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      <button class="show-pw-btn" type="button" onclick="togglePw()" id="show-pw-btn">Show</button>
    </div>
    <button class="login-btn" onclick="handleLogin()">Sign In →</button>
    <div class="hint">
      Demo accounts:<br>
      <strong>admin</strong> / <strong>admin123</strong> &nbsp;|&nbsp;
      <strong>rs</strong> / <strong>rs2026</strong>
    </div>
  </div>
</div>

<!-- ══════════════ APP PAGE ══════════════ -->
<div id="app-page">

  <!-- Search -->
  <div class="search-bar-wrapper">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search apps..." oninput="filterApps()" />
    </div>
  </div>

  <!-- Category filter -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setCategory('all', this)">All</button>
    <button class="filter-btn" onclick="setCategory('shopping', this)">🛍 Shopping</button>
    <button class="filter-btn" onclick="setCategory('food', this)">🍔 Food</button>
    <button class="filter-btn" onclick="setCategory('ott', this)">📺 OTT / Streaming</button>
  </div>

  <!-- Grid -->
  <div class="apps-container" id="apps-grid"></div>
</div>

<!-- FOOTER -->
<footer>© 2026 RS App Hub — Built by RS</footer>

<!-- TOAST -->
<div id="toast"></div>

<script>
  /* ── DATA ── */
  const USERS = {
    admin: 'admin123',
    rs:    'rs2026'
  };

  const APPS = [
    { name:'Myntra',          desc:'Fashion & Dresses',              cat:'shopping', url:'https://www.myntra.com',      img:'https://upload.wikimedia.org/wikipedia/commons/d/d5/Myntra_logo.png' },
    { name:'Amazon',          desc:'Shop everything',                cat:'shopping', url:'https://www.amazon.in',       img:'https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg' },
    { name:'Flipkart',        desc:'Great deals every day',          cat:'shopping', url:'https://www.flipkart.com',    img:'https://upload.wikimedia.org/wikipedia/commons/7/7a/Flipkart_logo.png' },
    { name:'Purplle',         desc:'Beauty & Makeup',                cat:'shopping', url:'https://www.purplle.com',     img:'https://play-lh.googleusercontent.com/9vW0Qz4G2uLzWfM6M9A0t0F0mQ1H4Jw8rA9zN7lP1rY7Q7k4zYVJQ2F6N5N6L6K5wQ' },
    { name:'Zomato',          desc:'Food Delivery',                  cat:'food',     url:'https://www.zomato.com',      img:'https://upload.wikimedia.org/wikipedia/commons/7/75/Zomato_logo.png' },
    { name:'Swiggy',          desc:'Food & Grocery',                 cat:'food',     url:'https://www.swiggy.com',      img:'https://upload.wikimedia.org/wikipedia/commons/1/13/Swiggy_logo.png' },
    { name:'Netflix',         desc:'Movies & TV Shows',              cat:'ott',      url:'https://www.netflix.com',     img:'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg' },
    { name:'Prime Video',     desc:'Amazon originals & more',        cat:'ott',      url:'https://www.primevideo.com',  img:'https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png' },
    { name:'Disney+ Hotstar', desc:'Movies, Sports & Live TV',       cat:'ott',      url:'https://www.hotstar.com',     img:'https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_Hotstar_logo.svg' },
    { name:'ZEE5',            desc:'Movies & TV Shows',              cat:'ott',      url:'https://www.zee5.com',        img:'https://upload.wikimedia.org/wikipedia/commons/6/63/ZEE5_logo.svg' },
  ];

  let activeCategory = 'all';

  /* ── AUTH ── */
  function handleLogin() {
    const u = document.getElementById('username').value.trim().toLowerCase();
    const p = document.getElementById('password').value;
    const err = document.getElementById('login-error');

    if (!u || !p) { err.textContent = '⚠ Please fill in both fields.'; err.style.display='block'; return; }
    if (USERS[u] && USERS[u] === p) {
      err.style.display = 'none';
      localStorage.setItem('rs_user', u);
      showApp(u);
      showToast('Welcome back, ' + u + '! 👋');
    } else {
      err.textContent = '⚠ Incorrect username or password.';
      err.style.display = 'block';
      document.getElementById('password').value = '';
    }
  }

  function logout() {
    localStorage.removeItem('rs_user');
    document.getElementById('app-page').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('user-badge').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('nav-links-login').style.display = 'block';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showToast('Logged out successfully.');
  }

  function showApp(username) {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').style.display = 'block';
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('logout-btn').style.display = 'block';
    document.getElementById('nav-links-login').style.display = 'none';
    document.getElementById('nav-username').textContent = username;
    document.getElementById('avatar-initials').textContent = username[0].toUpperCase();
    renderApps();
  }

  /* ── APPS ── */
  const TAG_CLASS = { shopping:'tag-shopping', food:'tag-food', ott:'tag-ott' };
  const TAG_LABEL = { shopping:'🛍 Shopping', food:'🍔 Food', ott:'📺 Streaming' };

  function renderApps() {
    const grid = document.getElementById('apps-grid');
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = APPS.filter(a => {
      const matchCat = activeCategory === 'all' || a.cat === activeCategory;
      const matchSearch = !query || a.name.toLowerCase().includes(query) || a.desc.toLowerCase().includes(query);
      return matchCat && matchSearch;
    });

    if (!filtered.length) {
      grid.innerHTML = '<div class="no-results">No apps found. Try a different search or category.</div>';
      return;
    }

    grid.innerHTML = filtered.map(a => `
      <div class="app-card">
        <span class="category-tag ${TAG_CLASS[a.cat]}">${TAG_LABEL[a.cat]}</span>
        <img src="${a.img}" alt="${a.name}" onerror="this.src='https://via.placeholder.com/70x70?text=${encodeURIComponent(a.name[0])}'">
        <h3>${a.name}</h3>
        <p>${a.desc}</p>
        <a class="open-btn" href="${a.url}" target="_blank" rel="noopener">Open App ↗</a>
      </div>
    `).join('');
  }

  function filterApps() { renderApps(); }

  function setCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').value = '';
    renderApps();
  }

  /* ── UTILS ── */
  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('show-pw-btn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
    else { inp.type = 'password'; btn.textContent = 'Show'; }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ── ENTER KEY ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-page').style.display !== 'none') {
      handleLogin();
    }
  });

  /* ── AUTO-LOGIN if remembered ── */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('rs_user');
    if (saved && USERS[saved]) showApp(saved);
  });
</script>
</body>
</html>
